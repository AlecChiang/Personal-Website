<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓語學習 Pro - 旗艦微調版</title>
    <style>
        :root {
            --bg: #121026;
            --card: #1e2533;
            --text: #f8d7da;
            --sub-text: #8899a6;
            --accent: #ffafbd;
            --btn-bg: rgba(255, 255, 255, 0.05);
            --shadow: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
            --sub-text: #636e72;
            --accent: #d63031;
            --btn-bg: rgba(0, 0, 0, 0.05);
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'PingFang TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background 0.4s ease;
        }

        .header h1 { letter-spacing: 5px; color: var(--accent); margin-bottom: 5px; }

        /* 功能控制列 (置中) */
        .function-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .icon-btn {
            background: var(--btn-bg);
            border: 1px solid rgba(128, 128, 128, 0.2);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .icon-btn:hover { background: var(--accent); color: white; }
        .icon-btn.active { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent); }

        /* 分類按鈕 */
        .categories { display: flex; gap: 12px; margin-bottom: 20px; }
        .cat-btn {
            background: transparent;
            border: 1px solid var(--sub-text);
            color: var(--sub-text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* 進度條 */
        .progress-container {
            width: 400px;
            margin-bottom: 20px;
            text-align: center;
        }
        .progress-bar {
            height: 6px;
            background: var(--btn-bg);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-fill {
            height: 100%;
            width: 20%;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        /* 卡片 */
        .card-scene {
            width: 500px;
            height: 350px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 35px;
            background: var(--card);
            box-shadow: 0 15px 30px var(--shadow);
            padding: 30px;
            box-sizing: border-box;
        }
        .card-back { transform: rotateY(180deg); }

        .word-kr { font-size: 4.5rem; margin: 0; }
        .word-zh { font-size: 3rem; margin-bottom: 10px; }
        .example-box {
            margin-top: 15px;
            padding: 12px;
            background: rgba(128, 128, 128, 0.08);
            border-radius: 15px;
            width: 100%;
        }
        .ex-kr { color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        .ex-zh { color: var(--sub-text); font-size: 0.9rem; }

        /* 底部控制 */
        .main-controls {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .nav-btn {
            background: var(--btn-bg);
            border: none;
            color: var(--text);
            width: 50px;
            height: 50px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .audio-btn {
            background: var(--accent);
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body data-theme="dark">

    <div class="header"><h1>韓語學習庫</h1></div>

    <div class="function-bar">
        <button class="icon-btn" id="autoplay-btn" onclick="toggleAutoplay()">⏱️ 自動學習</button>
        <button class="icon-btn" onclick="toggleTheme()" id="theme-icon">🌙 深色模式</button>
    </div>

    <div class="categories" id="cat-list"></div>

    <div class="progress-container">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span id="progressText" style="font-size: 0.9rem; color: var(--sub-text);">1 / 5</span>
    </div>

    <div class="card-scene" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div id="display-kr" class="word-kr">---</div>
                <div id="display-romaji" style="color:var(--sub-text); margin-top:10px;">---</div>
            </div>
            <div class="card-face card-back">
                <div id="display-zh" class="word-zh">---</div>
                <div class="example-box">
                    <div id="display-ex-kr" class="ex-kr">---</div>
                    <div id="display-ex-zh" class="ex-zh">---</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-controls">
        <button class="nav-btn" onclick="prevCard()">⏮️</button>
        <button class="audio-btn" onclick="speakCurrent()">🔊</button>
        <button class="nav-btn" onclick="nextCard()">⏭️</button>
    </div>

    <script>
        const vocabulary = {
            "👋 問候": [
                { kr: "안녕하세요", romaji: "An-nyeong-ha-se-yo", zh: "你好", exKr: "선생님, 안녕하세요?", exZh: "老師，您好嗎？" },
                { kr: "감사합니다", romaji: "Gam-sa-ham-ni-da", zh: "謝謝", exKr: "도와주셔서 감사합니다.", exZh: "謝謝您的幫助。" },
                { kr: "죄송합니다", romaji: "Joe-song-ham-ni-da", zh: "對不起", exKr: "늦어서 죄송합니다.", exZh: "抱歉我遲到了。" },
                { kr: "반가워요", romaji: "Ban-ga-wo-yo", zh: "見到你很高興", exKr: "만나서 정말 반가워요.", exZh: "見到你真的很開心。" },
                { kr: "안녕히 계세요", romaji: "An-nyeong-hi gye-se-yo", zh: "再見(留者)", exKr: "먼저 가보겠습니다. 안녕히 계세요.", exZh: "我先走了，再見。" }
            ],
            "🍎 生活": [
                { kr: "사과", romaji: "Sa-gwa", zh: "蘋果", exKr: "아침에 사과를 먹어요.", exZh: "我早上吃蘋果。" },
                { kr: "물", romaji: "Mul", zh: "水", note: "生存必需品", exKr: "시원한 물 한 잔 주세요.", exZh: "請給我一杯涼水。" },
                { kr: "친구", romaji: "Chin-gu", zh: "朋友", exKr: "제 친구는 한국 사람이에요.", exZh: "我的朋友是韓國人。" },
                { kr: "학교", romaji: "Hak-gyo", zh: "學校", exKr: "내일 학교에 가요.", exZh: "明天去學校。" },
                { kr: "빵", romaji: "Ppang", zh: "麵包", exKr: "이 빵은 정말 맛있어요.", exZh: "這個麵包真好吃。" }
            ],
            "📚 學習": [
                { kr: "책", romaji: "Chaek", zh: "書", exKr: "도서관에서 책을 읽어요.", exZh: "在圖書館讀書。" },
                { kr: "한국어", romaji: "Han-gug-eo", zh: "韓語", exKr: "한국어 공부가 재미있어요.", exZh: "學韓語很有趣。" },
                { kr: "선생님", romaji: "Seon-saeng-nim", zh: "老師", exKr: "우리 선생님은 친절해요.", exZh: "我們的老師很親切。" },
                { kr: "학생", romaji: "Hak-saeng", zh: "學生", exKr: "저는 대학교 학생입니다.", exZh: "我是大學生。" },
                { kr: "공부", romaji: "Gong-bu", zh: "學習", exKr: "매일 저녁에 공부해요.", exZh: "每天晚上學習。" }
            ]
        };

        let categories = Object.keys(vocabulary);
        let currentCat = categories[0];
        let currentIndex = 0;
        let isAutoplay = false;
        let autoplayTimer;

        // 初始化
        const catList = document.getElementById('cat-list');
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `cat-btn ${cat === currentCat ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCat = cat;
                currentIndex = 0;
                updateCard();
            };
            catList.appendChild(btn);
        });

        function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }

        function updateCard() {
            const data = vocabulary[currentCat][currentIndex];
            const card = document.getElementById('card');
            card.classList.remove('is-flipped');
            
            setTimeout(() => {
                document.getElementById('display-kr').innerText = data.kr;
                document.getElementById('display-romaji').innerText = data.romaji;
                document.getElementById('display-zh').innerText = data.zh;
                document.getElementById('display-ex-kr').innerText = data.exKr;
                document.getElementById('display-ex-zh').innerText = data.exZh;
            }, 150);

            const total = vocabulary[currentCat].length;
            const progress = ((currentIndex + 1) / total) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressText').innerText = `${currentIndex + 1} / ${total}`;
        }

        function speakCurrent() {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(vocabulary[currentCat][currentIndex].kr);
            msg.lang = 'ko-KR';
            window.speechSynthesis.speak(msg);
        }

        function nextCard() { currentIndex = (currentIndex + 1) % 5; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + 5) % 5; updateCard(); }

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            icon.innerHTML = isDark ? '☀️ 淺色模式' : '🌙 深色模式';
        }

        function toggleAutoplay() {
            isAutoplay = !isAutoplay;
            const btn = document.getElementById('autoplay-btn');
            if (isAutoplay) {
                btn.classList.add('active');
                runAutoplay();
            } else {
                btn.classList.remove('active');
                clearTimeout(autoplayTimer);
                window.speechSynthesis.cancel();
            }
        }

        function runAutoplay() {
            if (!isAutoplay) return;
            speakCurrent();
            autoplayTimer = setTimeout(() => {
                flipCard();
                autoplayTimer = setTimeout(() => {
                    nextCard();
                    runAutoplay();
                }, 3000);
            }, 2000);
        }

        updateCard();
    </script>
</body>
</html>
